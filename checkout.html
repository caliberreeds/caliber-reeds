<!DOCTYPE html>
<html>

<head>
<title>Checkout - Caliber Reeds</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:40px;
background:#fafafa;
}

h1{
text-align:center;
}

.orderSummary{
background:white;
padding:25px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:30px;
}

iframe{
width:100%;
height:2200px;
border:none;
}

</style>

</head>

<body>

<h1>Checkout</h1>

<p style="text-align:center;margin-bottom:30px;">
<a href="index.html" style="
text-decoration:none;
padding:10px 18px;
background:#444;
color:white;
border-radius:6px;
font-size:14px;
">
← Continue Shopping
</a>
</p>

<div class="orderSummary">

<h2>Your Order</h2>

<div id="summary"></div>

<p><strong>Estimated Total (before shipping): $<span id="summaryTotal"></span></strong></p>

</div>

<iframe id="orderForm"></iframe>

<script>

let cart = JSON.parse(localStorage.getItem("reedCart")) || [];

let prices = {
"Student Oboe":23,
"Advanced Oboe":27,
"Student EH":31,
"Advanced EH":35
};

let counts={};
let total=0;

cart.forEach(i=>{
counts[i]=(counts[i]||0)+1;
total+=prices[i];
});

let summaryHTML="";

for(let item in counts){
summaryHTML += item + " x" + counts[item] + "<br>";
}

document.getElementById("summary").innerHTML=summaryHTML;
document.getElementById("summaryTotal").textContent=total;

let oboeQty=0;
let ehQty=0;
let oboeType="";
let ehType="";

cart.forEach(i=>{

if(i.includes("Oboe")){
oboeQty++;
oboeType=i.includes("Student") ? "Student" : "Advanced";
}

if(i.includes("EH")){
ehQty++;
ehType=i.includes("Student") ? "Student" : "Advanced";
}

});

let formURL="https://docs.google.com/forms/d/e/1FAIpQLSeGOgPiLsBQym6UJV2T4p3e_S57GjEkKObhVjlscKygzqFiRQ/viewform?embedded=true";

let params =
"&entry.1548577114="+oboeQty+
"&entry.363462995="+oboeType+
"&entry.691546721="+ehQty+
"&entry.1694258351="+ehType+
"&entry.1658249047=$"+total;

document.getElementById("orderForm").src=formURL+params;

</script>
