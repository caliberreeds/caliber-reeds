<!DOCTYPE html>
<html>

<head>
<title>Checkout - Caliber Reeds</title>

<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:40px;
background:#fafafa;
}

.orderSummary{
background:white;
padding:25px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:30px;
}

input, textarea{
width:100%;
padding:10px;
margin:5px 0;
}
</style>

</head>

<body>

<h1>Checkout</h1>

<div class="orderSummary">
<h2>Your Order</h2>
<div id="summary"></div>

<p><strong>Shipping:</strong> $<span id="shippingCost"></span></p>
<p><strong>Total:</strong> $<span id="summaryTotal"></span></p>
</div>

<h3>Customer Info</h3>

<input id="custName" placeholder="Full Name">
<input id="custEmail" placeholder="Email">
<textarea id="custAddress" placeholder="Shipping Address"></textarea>

<button onclick="placeOrder()">Place Order</button>

<script>

// LOAD CART
let cart = JSON.parse(localStorage.getItem("reedCart")) || [];
let shipping = parseInt(localStorage.getItem("reedShipping")) || 0;

// PRICES
let prices = {
"Student Oboe":23,
"Advanced Oboe":27,
"Student EH":31,
"Advanced EH":35
};

let total = 0;
let summaryHTML = "";
let orderText = "";

// BUILD SUMMARY
cart.forEach(function(item){
summaryHTML += item + "<br>";
total += prices[item];
orderText += item + ", ";
});

// DISPLAY
document.getElementById("summary").innerHTML = summaryHTML;
document.getElementById("shippingCost").textContent = shipping;
document.getElementById("summaryTotal").textContent = total + shipping;


// SIMPLE ORDER FUNCTION
function placeOrder(){

let name = document.getElementById("custName").value;
let email = document.getElementById("custEmail").value;
let address = document.getElementById("custAddress").value;

if(!name || !email || !address){
alert("Fill out all fields");
return;
}

let form = document.createElement("form");
form.method = "POST";
form.action = "https://script.google.com/macros/s/AKfycbzx00LqNHPb4aJkjsbed5vq0CQ5mSzNLRqXGKk3ZxLrbAbf-4jwgfeKRHmoAzbOgQ3q4A/exec";

function addField(name, value){
let input = document.createElement("input");
input.type = "hidden";
input.name = name;
input.value = value;
form.appendChild(input);
}

addField("items", orderText);
addField("shipping", shipping);
addField("total", total + shipping);
addField("name", name);
addField("email", email);
addField("address", address);

document.body.appendChild(form);
form.submit();

alert("Order placed!");

localStorage.removeItem("reedCart");

}
</script>

</body>
</html>
