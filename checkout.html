<!DOCTYPE html>
<html>

<head>
<title>Checkout - Caliber Reeds</title>

<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:40px;
background:#fafafa;
}

.orderSummary{
background:white;
padding:25px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:30px;
}

input, textarea{
width:100%;
padding:10px;
margin:5px 0;
}
</style>

</head>

<body>

<h1>Checkout</h1>

<div class="orderSummary">
<h2>Your Order</h2>
<div id="summary"></div>

<p><strong>Shipping:</strong> $<span id="shippingCost"></span></p>
<p><strong>Total:</strong> $<span id="summaryTotal"></span></p>
</div>

<h3>Customer Info</h3>

<input id="custName" placeholder="Full Name">
<input id="custEmail" placeholder="Email">
<textarea id="custAddress" placeholder="Shipping Address"></textarea>

<button onclick="placeOrder()">Place Order</button>

<script>

// LOAD CART
let cart = JSON.parse(localStorage.getItem("reedCart")) || [];
let shipping = parseInt(localStorage.getItem("reedShipping")) || 0;

// PRICES
let prices = {
"Student Oboe":23,
"Advanced Oboe":27,
"Student EH":31,
"Advanced EH":35
};

let total = 0;
let summaryHTML = "";
let orderText = "";

// BUILD SUMMARY
cart.forEach(function(item){
summaryHTML += item + "<br>";
total += prices[item];
orderText += item + ", ";
});

// DISPLAY
document.getElementById("summary").innerHTML = summaryHTML;
document.getElementById("shippingCost").textContent = shipping;
document.getElementById("summaryTotal").textContent = total + shipping;


// SIMPLE ORDER FUNCTION
async function placeOrder(){

let name = document.getElementById("custName").value;
let email = document.getElementById("custEmail").value;
let address = document.getElementById("custAddress").value;

if(!name || !email || !address){
alert("Fill out all fields");
return;
}

let orderData = {
items: orderText,
shipping: shipping,
total: total + shipping,
name: name,
email: email,
address: address
};

try {

let res = await fetch("https://script.google.com/macros/s/AKfycbzYTkIUof6om8kYvKYGVNyngSZS9YjjkPpg_5iHuLEkpEsXZ_iwspAr2g1fBrI20pHOvQ/exec", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify(orderData)
});

let result = await res.json();

alert("Order placed!");

// clear cart
localStorage.removeItem("reedCart");

// redirect
window.location.href = "index.html";

} catch(err){
alert("Order failed.");
}

}

</script>

</body>
</html>
