<!DOCTYPE html>
<html>

<head>
<title>Checkout - Caliber Reeds</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:40px;
background:#fafafa;
}

h1{
text-align:center;
}

.orderSummary{
background:white;
padding:25px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:30px;
}

iframe{
width:100%;
height:2200px;
border:none;
}

</style>

</head>

<body>

<h1>Checkout</h1>

<p style="text-align:center;margin-bottom:30px;">
<a href="index.html" style="
text-decoration:none;
padding:10px 18px;
background:#444;
color:white;
border-radius:6px;
font-size:14px;
">
← Continue Shopping
</a>
</p>

<div class="orderSummary">

<h2>Your Order</h2>

<div id="summary"></div>

<p>
<strong>Shipping:</strong> $<span id="shippingCost"></span>
</p>

<p>
<strong>Order Total (before possible taxes): $<span id="summaryTotal"></span></strong>
</p>

</div>

<h3>Customer Info</h3>

<input id="custName" placeholder="Full Name" style="width:100%;padding:10px;margin:5px 0;">

<input id="custEmail" placeholder="Email" style="width:100%;padding:10px;margin:5px 0;">

<textarea id="custAddress" placeholder="Shipping Address" style="width:100%;padding:10px;margin:5px 0;"></textarea>

<textarea id="custNotes" placeholder="Notes (optional)" style="width:100%;padding:10px;margin:5px 0;"></textarea>
  
<div style="text-align:center;margin-top:30px;">

<button onclick="placeOrder()" style="
padding:14px 26px;
font-size:16px;
background:#444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
">

Place Order

</button>
  
</div>

<script>

let cart = JSON.parse(localStorage.getItem("reedCart")) || [];
let shipping = parseInt(localStorage.getItem("reedShipping")) || 0;

if(cart.length === 0){
  alert("Your cart is empty.");
  window.location = "index.html";
}

let prices = {
"Student Oboe":23,
"Advanced Oboe":27,
"Student EH":31,
"Advanced EH":35
};

let counts = {};
let total = 0;
let orderText = "";

// Count items
cart.forEach(function(item){

counts[item] = (counts[item] || 0) + 1;
total += prices[item];

});

// Build order summary
let summaryHTML = "";

for(let item in counts){

summaryHTML += item + " x" + counts[item] + "<br>";

orderText += item + " x" + counts[item] + ", ";

}

// Show summary
document.getElementById("summary").innerHTML = summaryHTML;

document.getElementById("shippingCost").textContent = shipping;

document.getElementById("summaryTotal").textContent = total + shipping;


// Continue to order form
function openOrderForm(){

let formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeGOgPiLsBQym6UJV2T4p3e_S57GjEkKObhVjlscKygzqFiRQ/viewform?";

let params =
"entry.1548577114=" + encodeURIComponent(orderText) +
"&entry.1658249047=" + (total + shipping) +
"&entry.1111111111=" + shipping; // replace with shipping field ID

window.location = formURL + params;

}

async function placeOrder(){
document.querySelector("button").disabled = true;

let name = document.getElementById("custName").value;
let email = document.getElementById("custEmail").value;
let address = document.getElementById("custAddress").value;
let notes = document.getElementById("custNotes").value;

if(name=="" || email=="" || address==""){
alert("Please fill out name, email, and address.");
return;
}

let orderData = {
items: orderText,
shipping: shipping,
total: total + shipping,
name: name,
email: email,
address: address,
notes: notes
};

let response = await fetch("https://script.google.com/macros/s/AKfycbzYTkIUof6om8kYvKYGVNyngSZS9YjjkPpg_5iHuLEkpEsXZ_iwspAr2g1fBrI20pHOvQ/exec",{
method:"POST",
body: JSON.stringify(orderData)
});

let result = await response.json();

localStorage.removeItem("reedCart");

alert("Order placed! Order #" + result.order);

window.location="index.html";

}

</script>
