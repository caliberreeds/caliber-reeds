<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Caliber Reeds</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark:  #1e3d2a;
      --green-mid:   #2f5e3f;
      --green-light: #4a8c60;
      --gold:        #c9a84c;
      --cream:       #f7f4ee;
      --white:       #ffffff;
      --gray-light:  #e8e4dc;
      --gray-mid:    #999;
      --text:        #1a1a1a;
      --shadow:      0 4px 20px rgba(0,0,0,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--cream);
      color: var(--text);
      max-width: 700px;
      margin: 0 auto;
      padding: 48px 32px 60px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--green-mid);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 28px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--green-dark); }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      color: var(--green-dark);
      margin-bottom: 32px;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--gray-light);
      border-radius: 12px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--green-dark);
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--gray-light);
    }

    /* Order Summary */
    .order-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--gray-light);
      font-size: 15px;
    }
    .order-line:last-of-type { border-bottom: none; }
    .order-line .item-name { font-weight: 600; color: var(--green-dark); }
    .order-line .item-qty  { color: var(--gray-mid); font-size: 13px; margin-left: 5px; }
    .order-line .item-price { color: var(--green-mid); font-weight: 600; }

    .totals-block {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 2px solid var(--gray-light);
    }
    .totals-block p {
      display: flex;
      justify-content: space-between;
      font-size: 15px;
      color: #555;
      margin-bottom: 6px;
    }
    .totals-block .grand {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--green-dark);
      margin-top: 8px;
    }

    /* Form */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--green-light);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--gray-light);
      border-radius: 8px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 15px;
      background: var(--cream);
      color: var(--text);
      transition: border-color 0.2s, outline 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: 2px solid var(--green-light);
      border-color: transparent;
    }
    .form-group textarea {
      height: 90px;
      resize: vertical;
    }

    /* Pay method banner */
    #payMethodNote {
      display: none;
      background: #eaf4ee;
      border: 1px solid #b2d9bf;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--green-dark);
      margin-bottom: 20px;
    }

    /* Submit button */
    .btn-place {
      width: 100%;
      padding: 15px;
      background: var(--green-mid);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Source Sans 3', sans-serif;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-place:hover   { background: var(--green-dark); }
    .btn-place:active  { transform: scale(0.98); }
    .btn-place:disabled {
      background: var(--gray-mid);
      cursor: not-allowed;
    }

    /* Confirmation */
    #confirmation {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    #confirmation .check {
      font-size: 52px;
      margin-bottom: 16px;
    }
    #confirmation h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--green-dark);
      margin-bottom: 12px;
    }
    #confirmation p {
      font-size: 15px;
      color: #555;
      line-height: 1.7;
      margin-bottom: 8px;
    }
    #confirmation .back-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: var(--green-mid);
      color: var(--white);
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.2s;
    }
    #confirmation .back-btn:hover { background: var(--green-dark); }

    /* Error */
    #errorMsg {
      display: none;
      background: #fff0f0;
      border: 1px solid #f5c2c2;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: #c00;
      margin-bottom: 16px;
    }

    @media (max-width: 580px) {
      body { padding: 32px 18px 48px; }
      h1   { font-size: 30px; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← Back to Shop</a>

  <h1>Checkout</h1>

  <!-- Order summary + form (hidden after success) -->
  <div id="checkoutForm">

    <!-- Order Summary -->
    <div class="card">
      <h2>Order Summary</h2>
      <div id="summaryLines"></div>
      <div class="totals-block">
        <p><span>Subtotal</span><span>$<span id="subtotalAmt">0</span></span></p>
        <p><span>Shipping</span><span>$<span id="shippingAmt">0</span></span></p>
        <p class="grand"><span>Total</span><span>$<span id="totalAmt">0</span></span></p>
      </div>
    </div>

    <!-- Customer Info -->
    <div class="card">
      <h2>Your Information</h2>

      <div id="payMethodNote"></div>

      <div class="form-group">
        <label for="custName">Full Name</label>
        <input type="text" id="custName" placeholder="Jane Smith" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="custEmail">Email Address</label>
        <input type="email" id="custEmail" placeholder="jane@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="custAddress">Shipping Address</label>
        <textarea id="custAddress" placeholder="123 Main St&#10;City, State ZIP" autocomplete="street-address"></textarea>
      </div>
      <div class="form-group">
        <label for="custNotes">Order Notes (optional)</label>
        <input type="text" id="custNotes" placeholder="e.g. medium-soft scrape preferred">
      </div>

      <div id="errorMsg"></div>

      <button class="btn-place" id="placeBtn" onclick="placeOrder()">Place Order</button>
    </div>

  </div>

  <!-- Confirmation (shown after success) -->
  <div class="card" id="confirmation">
    <div class="check">✅</div>
    <h2>Order Received!</h2>
    <p>Thank you, <strong id="confirmName"></strong>. Your order has been placed.</p>
    <p>A confirmation will be sent to <strong id="confirmEmail"></strong>.</p>
    <p id="venmoNote" style="display:none; margin-top:12px; color: var(--green-mid); font-weight:600;">
      Please send payment via Venmo to <strong>@CalibreReedsByBen</strong> to complete your order.
    </p>
    <a href="index.html" class="back-btn">← Back to Shop</a>
  </div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEZmJIgDw38YjasgWujhKVj5c96Oe_FBZP6Pr7aP9EZhBsYMLqcL1M04J6qLRNZvhcpw/exec";

  const prices = {
    "Student Oboe":  23,
    "Advanced Oboe": 27,
    "Student EH":    31,
    "Advanced EH":   35
  };

  // Load cart & shipping from localStorage
  const cart     = JSON.parse(localStorage.getItem("reedCart"))    || [];
  const shipping = parseInt(localStorage.getItem("reedShipping"))  || 5;
  const payMethod= localStorage.getItem("reedPayMethod")           || "";

  // Build summary
  const counts = {};
  let subtotal = 0;
  cart.forEach(item => {
    counts[item] = (counts[item] || 0) + 1;
    subtotal += prices[item];
  });

  // Render summary lines
  const summaryLines = document.getElementById("summaryLines");
  for (let item in counts) {
    const qty       = counts[item];
    const itemTotal = prices[item] * qty;
    const div = document.createElement("div");
    div.className = "order-line";
    div.innerHTML = `
      <span>
        <span class="item-name">${item}</span>
        <span class="item-qty">x${qty}</span>
      </span>
      <span class="item-price">$${itemTotal}</span>`;
    summaryLines.appendChild(div);
  }

  document.getElementById("subtotalAmt").textContent = subtotal;
  document.getElementById("shippingAmt").textContent = shipping;
  document.getElementById("totalAmt").textContent    = subtotal + shipping;

  // Show pay method note
  if (payMethod === "venmo") {
    const note = document.getElementById("payMethodNote");
    note.style.display = "block";
    note.textContent = "💙 You selected Venmo — you'll see payment instructions after placing your order.";
  }

  // Place order
  async function placeOrder() {
    const name    = document.getElementById("custName").value.trim();
    const email   = document.getElementById("custEmail").value.trim();
    const address = document.getElementById("custAddress").value.trim();
    const notes   = document.getElementById("custNotes").value.trim();
    const errBox  = document.getElementById("errorMsg");
    const btn     = document.getElementById("placeBtn");

    // Validate
    if (!name || !email || !address) {
      errBox.style.display = "block";
      errBox.textContent   = "Please fill out your name, email, and shipping address.";
      return;
    }
    if (!email.includes("@")) {
      errBox.style.display = "block";
      errBox.textContent   = "Please enter a valid email address.";
      return;
    }
    if (cart.length === 0) {
      errBox.style.display = "block";
      errBox.textContent   = "Your cart is empty. Go back and add some reeds!";
      return;
    }

    errBox.style.display = "none";
    btn.disabled         = true;
    btn.textContent      = "Placing order…";

    // Build order text
    let orderText = "";
    for (let item in counts) {
      orderText += `${item} x${counts[item]}, `;
    }
    orderText = orderText.replace(/, $/, "");

    const payload = {
      items:    orderText,
      shipping: shipping,
      total:    subtotal + shipping,
      name:     name,
      email:    email,
      address:  address,
      notes:    notes,
      payMethod: payMethod || "not specified"
    };

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode:   "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      // Clear cart
      localStorage.removeItem("reedCart");
      localStorage.removeItem("reedPayMethod");

      // Show confirmation
      document.getElementById("checkoutForm").style.display = "none";
      const conf = document.getElementById("confirmation");
      conf.style.display = "block";
      document.getElementById("confirmName").textContent  = name;
      document.getElementById("confirmEmail").textContent = email;

      if (payMethod === "venmo") {
        document.getElementById("venmoNote").style.display = "block";
      }

    } catch (err) {
      btn.disabled    = false;
      btn.textContent = "Place Order";
      errBox.style.display = "block";
      errBox.textContent   = "Something went wrong submitting your order. Please try again or contact us directly.";
    }
  }
</script>
</body>
</html>
