<!DOCTYPE html>
<html>

<head>
<title>Checkout - Caliber Reeds</title>

<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:40px;
background:#fafafa;
}

h1{text-align:center;}

.orderSummary{
background:white;
padding:25px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:30px;
}

input, textarea{
width:100%;
padding:10px;
margin:5px 0;
}
</style>

</head>

<body>

<h1>Checkout</h1>

<div class="orderSummary">
<h2>Your Order</h2>
<div id="summary"></div>

<p><strong>Shipping:</strong> $<span id="shippingCost"></span></p>
<p><strong>Total:</strong> $<span id="summaryTotal"></span></p>
</div>

<h3>Customer Info</h3>

<input id="custName" placeholder="Full Name">
<input id="custEmail" placeholder="Email">
<textarea id="custAddress" placeholder="Shipping Address"></textarea>
<textarea id="custNotes" placeholder="Notes (optional)"></textarea>

<div style="text-align:center;margin-top:30px;">
<button onclick="placeOrder()" style="
padding:14px 26px;
font-size:16px;
background:#444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
">
Place Order
</button>
</div>

<script>

// CART DATA
let cart = JSON.parse(localStorage.getItem("reedCart")) || [];
let shipping = parseInt(localStorage.getItem("reedShipping")) || 0;

if(cart.length === 0){
alert("Your cart is empty.");
window.location = "index.html";
}

// PRICES
let prices = {
"Student Oboe":23,
"Advanced Oboe":27,
"Student EH":31,
"Advanced EH":35
};

let counts = {};
let total = 0;
let orderText = "";

// BUILD ORDER
cart.forEach(function(item){
counts[item] = (counts[item] || 0) + 1;
total += prices[item];
});

let summaryHTML = "";

for(let item in counts){
summaryHTML += item + " x" + counts[item] + "<br>";
orderText += item + " x" + counts[item] + ", ";
}

// DISPLAY
document.getElementById("summary").innerHTML = summaryHTML;
document.getElementById("shippingCost").textContent = shipping;
document.getElementById("summaryTotal").textContent = total + shipping;


// 🔥 PLACE ORDER FUNCTION
async function placeOrder(){

let name = document.getElementById("custName").value;
let email = document.getElementById("custEmail").value;
let address = document.getElementById("custAddress").value;
let notes = document.getElementById("custNotes").value;

if(name=="" || email=="" || address==""){
alert("Please fill out name, email, and address.");
return;
}

let orderData = {
items: orderText,
shipping: shipping,
total: total + shipping,
name: name,
email: email,
address: address,
notes: notes
};

try {

let response = await fetch("YOUR_SCRIPT_URL_HERE", {
method: "POST",
body: JSON.stringify(orderData)
});

// 👇 THIS IS THE IMPORTANT PART
let text = await response.text();
alert("SERVER RESPONSE:\n\n" + text);

} catch(err){

// 👇 THIS WILL SHOW THE REAL ERROR
alert("FETCH ERROR:\n\n" + err);

}

}

let orderData = {
items: orderText,
shipping: shipping,
total: total + shipping,
name: name,
email: email,
address: address,
notes: notes
};

try {

let response = await fetch("https://script.google.com/macros/s/AKfycbzYTkIUof6om8kYvKYGVNyngSZS9YjjkPpg_5iHuLEkpEsXZ_iwspAr2g1fBrI20pHOvQ/exec", {
method: "POST",
body: JSON.stringify(orderData)
});

let result = await response.text();

// DEBUG (we’ll remove later)
alert(result);

// clear cart
localStorage.removeItem("reedCart");

// redirect
window.location = "index.html";

} catch(err){
alert("Error placing order. Check console.");
console.error(err);
}

}

</script>

</body>
</html>
