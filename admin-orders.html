<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Caliber Reeds Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark:  #1e3d2a;
      --green-mid:   #2f5e3f;
      --green-light: #4a8c60;
      --gold:        #c9a84c;
      --cream:       #f7f4ee;
      --white:       #ffffff;
      --gray-light:  #e8e4dc;
      --gray-mid:    #999;
      --text:        #1a1a1a;
      --shadow:      0 4px 20px rgba(0,0,0,0.10);
      --red:         #c0392b;
      --red-light:   #fadbd8;
      --green-light2: #d4edda;
      --blue-light:  #cce5ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--cream);
      color: var(--text);
      max-width: 1000px;
      margin: 0 auto;
      padding: 48px 32px 60px;
    }

    /* ── Header ── */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--gray-light);
    }
    .admin-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--green-dark);
    }
    .admin-header p {
      font-size: 13px;
      color: var(--gray-mid);
      margin-top: 4px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ── Nav links ── */
    .admin-nav {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .admin-nav a {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      background: var(--white);
      border: 1px solid var(--gray-light);
      color: var(--green-dark);
      transition: all 0.2s;
    }
    .admin-nav a:hover { background: var(--green-dark); color: white; }
    .admin-nav a.active { background: var(--green-dark); color: white; }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      border: 2px solid var(--gray-light);
      background: var(--white);
      color: var(--gray-mid);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Source Sans 3', sans-serif;
    }
    .filter-btn:hover { border-color: var(--green-mid); color: var(--green-mid); }
    .filter-btn.active { background: var(--green-dark); border-color: var(--green-dark); color: white; }

    /* ── Stats bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat {
      background: var(--white);
      border: 1px solid var(--gray-light);
      border-radius: 10px;
      padding: 16px 20px;
      text-align: center;
    }
    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--green-dark);
      font-weight: 700;
    }
    .stat-label {
      font-size: 12px;
      color: var(--gray-mid);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    /* ── Order Cards ── */
    .order-card {
      background: var(--white);
      border: 1px solid var(--gray-light);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      border-left: 5px solid var(--gray-light);
    }
    .order-card.status-new-unpaid    { border-left-color: #c0392b; }
    .order-card.status-new-paid      { border-left-color: #27ae60; }
    .order-card.status-progress-unpaid { border-left-color: #c0392b; }
    .order-card.status-progress-paid { border-left-color: #27ae60; }
    .order-card.status-shipped       { border-left-color: #2980b9; }
    .order-card.status-cancelled     { border-left-color: #7f8c8d; }

    .order-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .order-number {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--green-dark);
      font-weight: 700;
    }
    .order-date {
      font-size: 13px;
      color: var(--gray-mid);
      margin-top: 2px;
    }
    .order-total {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--green-mid);
      font-weight: 700;
    }

    .order-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .order-field label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--green-light);
      display: block;
      margin-bottom: 3px;
    }
    .order-field span {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
    }

    .order-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 16px;
      border-top: 1px solid var(--gray-light);
    }

    .status-select {
      padding: 8px 12px;
      border: 1px solid var(--gray-light);
      border-radius: 6px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13px;
      background: var(--cream);
      color: var(--text);
      cursor: pointer;
    }
    .status-select:focus { outline: 2px solid var(--green-light); }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Source Sans 3', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-green  { background: var(--green-mid); color: white; }
    .btn-green:hover  { background: var(--green-dark); }
    .btn-gold   { background: var(--gold); color: var(--green-dark); }
    .btn-gold:hover   { background: #b8963e; }
    .btn-blue   { background: #2980b9; color: white; }
    .btn-blue:hover   { background: #2471a3; }
    .btn-gray   { background: var(--gray-light); color: var(--text); }
    .btn-gray:hover   { background: #d5d0c8; }
    .btn-red    { background: var(--red); color: white; }
    .btn-red:hover    { background: #a93226; }

    .save-status {
      font-size: 13px;
      color: var(--green-mid);
      display: none;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-mid);
      font-size: 15px;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-mid);
      font-size: 15px;
    }

    /* ── Logout ── */
    .logout-btn {
      background: none;
      border: 1px solid var(--gray-light);
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--gray-mid);
      cursor: pointer;
      font-family: 'Source Sans 3', sans-serif;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: var(--gray-light); color: var(--text); }

    @media (max-width: 600px) {
      body { padding: 32px 18px 48px; }
      .stats-bar { grid-template-columns: 1fr 1fr; }
      .order-grid { grid-template-columns: 1fr; }
      .admin-header { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

  <div id="mainContent" style="display:none;">

    <div class="admin-header">
      <div>
        <h1>Orders</h1>
        <p>Caliber Reeds by Ben</p>
      </div>
      <div class="header-right">
        <a href="admin.html" class="btn btn-gray">← Settings</a>
        <button class="logout-btn" onclick="logout()">Log Out</button>
      </div>
    </div>

    <div class="admin-nav">
      <a href="admin.html">Settings</a>
      <a href="admin-orders.html" class="active">Orders</a>
      <a href="admin-prices.html">Prices</a>
      <a href="admin-insights.html">Insights</a>
      <a href="admin-reviews.html">Reviews</a>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-number" id="statTotal">—</div>
        <div class="stat-label">Total Orders</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="statUnpaid">—</div>
        <div class="stat-label">Unpaid</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="statRevenue">—</div>
        <div class="stat-label">Total Revenue</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="statShipped">—</div>
        <div class="stat-label">Shipped</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterOrders('all', this)">All Orders</button>
      <button class="filter-btn" onclick="filterOrders('unpaid', this)">Unpaid</button>
      <button class="filter-btn" onclick="filterOrders('paid', this)">Paid</button>
      <button class="filter-btn" onclick="filterOrders('shipped', this)">Shipped</button>
      <button class="filter-btn" id="archivedToggle" onclick="toggleArchived(this)">📦 Show Archived</button>
    </div>

    <div style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; align-items:center;">
      <input type="text" id="searchInput" placeholder="🔍 Search by name, email, address, items, order #..."
        oninput="applyFilters()"
        style="flex:1; min-width:200px; padding:10px 14px; border:1px solid var(--gray-light); border-radius:8px; font-size:14px; font-family:'Source Sans 3',sans-serif; background:var(--white);">
      <select id="sortSelect" onchange="applyFilters()"
        style="padding:10px 14px; border:1px solid var(--gray-light); border-radius:8px; font-size:14px; font-family:'Source Sans 3',sans-serif; background:var(--white); color:var(--text);">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="total-high">Total: High to Low</option>
        <option value="total-low">Total: Low to High</option>
        <option value="name">Name A-Z</option>
        <option value="status">Status</option>
      </select>
    </div>

    <div id="ordersContainer">
      <div class="loading">Loading orders...</div>
    </div>

  </div>

  <!-- Cancel/Refund Modal -->
  <div id="cancelModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:12px; padding:36px; max-width:440px; width:90%; box-shadow:0 8px 40px rgba(0,0,0,0.2);">
      <h2 style="font-family:'Playfair Display',serif; color:#c0392b; margin-bottom:8px;">Cancel Order</h2>
      <p id="cancelModalDesc" style="font-size:14px; color:#555; margin-bottom:20px;"></p>

      <div style="margin-bottom:16px;">
        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Reason for Cancellation</label>
        <input type="text" id="cancelReason" placeholder="e.g. Customer requested, damaged reed..."
          style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:'Source Sans 3',sans-serif; box-sizing:border-box;">
      </div>

      <div id="refundSection" style="display:none; margin-bottom:20px;">
        <p id="refundSectionLabel" style="font-size:13px; font-weight:600; color:#1e3d2a; margin-bottom:10px;">Refund</p>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
          <button class="btn btn-green" onclick="setRefundType('full')" id="refundFullBtn">Full Refund</button>
          <button class="btn btn-gray" onclick="setRefundType('partial')" id="refundPartialBtn">Partial Refund</button>
          <button class="btn btn-gray" onclick="setRefundType('none')" id="refundNoneBtn">No Refund</button>
        </div>
        <div id="partialAmountRow" style="display:none; margin-top:8px;">
          <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Refund Amount ($)</label>
          <input type="number" id="partialAmount" min="0.01" step="0.01"
            style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:'Source Sans 3',sans-serif;">
        </div>
        <div id="manualRefRow" style="display:none; margin-top:8px;">
          <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Manual Refund Reference</label>
          <input type="text" id="manualRefInput" placeholder="e.g. Venmo transaction ID"
            style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:'Source Sans 3',sans-serif;">
        </div>
      </div>

      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button class="btn btn-gray" onclick="closeCancelModal()">Go Back</button>
        <button class="btn btn-red" onclick="confirmCancel()">Confirm Cancellation</button>
      </div>
    </div>
  </div>

  <div id="authError" style="display:none; text-align:center; padding:60px 20px;">
    <p style="font-size:16px; color:#c00; margin-bottom:16px;">You need to log in first.</p>
    <a href="admin.html" style="color: #2f5e3f; font-weight:600;">← Go to Admin Login</a>
  </div>

<script>
  const GET_ORDERS_URL    = "/.netlify/functions/get-orders";
  const UPDATE_ORDER_URL  = "/.netlify/functions/update-order";

  let allOrders = [];
  let adminPassword = sessionStorage.getItem("adminPassword") || "";

  const statusColors = {
    "New - Unpaid":          "status-new-unpaid",
    "New - Paid":            "status-new-paid",
    "In Progress - Unpaid":  "status-progress-unpaid",
    "In Progress - Paid":    "status-progress-paid",
    "Shipped":               "status-shipped",
    "Cancelled":             "status-cancelled"
  };

  async function init() {
    if (!adminPassword) {
      document.getElementById("authError").style.display = "block";
      return;
    }
    document.getElementById("mainContent").style.display = "block";
    await loadOrders();
  }

  async function loadOrders() {
    try {
      const response = await fetch(GET_ORDERS_URL + "?password=" + encodeURIComponent(adminPassword));
      if (response.status === 401) {
        sessionStorage.removeItem("adminPassword");
        document.getElementById("mainContent").style.display = "none";
        document.getElementById("authError").style.display = "block";
        return;
      }
      allOrders = await response.json();
      updateStats();
      applyFilters();
    } catch (err) {
      document.getElementById("ordersContainer").innerHTML =
        '<div class="empty-state">Could not load orders. Please try again.</div>';
    }
  }

  function updateStats() {
    const total    = allOrders.length;
    const unpaid   = allOrders.filter(o => o.status && o.status.includes("Unpaid")).length;
    const shipped  = allOrders.filter(o => o.status === "Shipped").length;
    const revenue  = allOrders.reduce((sum, o) => sum + (parseFloat(o.total) || 0), 0);

    document.getElementById("statTotal").textContent   = total;
    document.getElementById("statUnpaid").textContent  = unpaid;
    document.getElementById("statShipped").textContent = shipped;
    document.getElementById("statRevenue").textContent = "$" + revenue.toFixed(0);
  }

  let activeFilter = "all";
  let showArchived = false;

  function filterOrders(filter, btn) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = filter;
    applyFilters();
  }

  function applyFilters() {
    const search = document.getElementById("searchInput").value.toLowerCase().trim();
    const sort   = document.getElementById("sortSelect").value;

    // Apply status filter
    let filtered = allOrders;

    // Always filter out archived unless showArchived is true or search matches
    if (search) {
      // Show archived orders if they match search
      filtered = filtered.filter(o =>
        !o.archived || (
          (o.orderNumber && o.orderNumber.toString().includes(search)) ||
          (o.name        && o.name.toLowerCase().includes(search)) ||
          (o.email       && o.email.toLowerCase().includes(search)) ||
          (o.address     && o.address.toLowerCase().includes(search)) ||
          (o.items       && o.items.toLowerCase().includes(search)) ||
          (o.status      && o.status.toLowerCase().includes(search)) ||
          (o.payMethod   && o.payMethod.toLowerCase().includes(search)) ||
          (o.tracking    && o.tracking.toLowerCase().includes(search)) ||
          (o.notes       && o.notes.toLowerCase().includes(search))
        )
      );
    } else {
      filtered = filtered.filter(o => !o.archived || showArchived);
    }

    // Apply status filter (skip for archived)
    if (activeFilter === "unpaid") {
      filtered = filtered.filter(o => o.archived || (o.status && o.status.includes("Unpaid")));
    } else if (activeFilter === "paid") {
      filtered = filtered.filter(o => o.archived || (o.status && o.status.includes("Paid")));
    } else if (activeFilter === "shipped") {
      filtered = filtered.filter(o => o.archived || o.status === "Shipped");
    }

    // Apply search filter
    if (search) {
      filtered = filtered.filter(o =>
        (o.orderNumber && o.orderNumber.toString().includes(search)) ||
        (o.name        && o.name.toLowerCase().includes(search)) ||
        (o.email       && o.email.toLowerCase().includes(search)) ||
        (o.address     && o.address.toLowerCase().includes(search)) ||
        (o.items       && o.items.toLowerCase().includes(search)) ||
        (o.status      && o.status.toLowerCase().includes(search)) ||
        (o.payMethod   && o.payMethod.toLowerCase().includes(search)) ||
        (o.tracking    && o.tracking.toLowerCase().includes(search)) ||
        (o.notes       && o.notes.toLowerCase().includes(search))
      );
    }

    // Apply sort
    filtered = [...filtered].sort((a, b) => {
      if (sort === "newest")     return new Date(b.date) - new Date(a.date);
      if (sort === "oldest")     return new Date(a.date) - new Date(b.date);
      if (sort === "total-high") return (parseFloat(b.total) || 0) - (parseFloat(a.total) || 0);
      if (sort === "total-low")  return (parseFloat(a.total) || 0) - (parseFloat(b.total) || 0);
      if (sort === "name")       return (a.name || "").localeCompare(b.name || "");
      if (sort === "status")     return (a.status || "").localeCompare(b.status || "");
      return 0;
    });

    renderOrders(filtered);
  }

  function toggleArchived(btn) {
    showArchived = !showArchived;
    btn.classList.toggle("active", showArchived);
    btn.textContent = showArchived ? "📦 Hide Archived" : "📦 Show Archived";
    applyFilters();
  }

  function renderOrders(orders) {
    const container = document.getElementById("ordersContainer");
    if (orders.length === 0) {
      container.innerHTML = '<div class="empty-state">No orders found.</div>';
      return;
    }

    container.innerHTML = orders.map(order => {
      const statusClass = statusColors[order.status] || "";
      const dateStr = order.date ? new Date(order.date).toLocaleDateString("en-US", {
        year: "numeric", month: "short", day: "numeric"
      }) : "—";

      return `
        <div class="order-card ${statusClass}" id="card-${order.orderNumber}" ${order.archived ? 'style="opacity:0.7; border-left-color:#999;"' : ''}>
          ${order.archived ? '<div style="background:#f0f0f0; padding:4px 16px; font-size:12px; color:#999; font-weight:600; border-radius:4px; display:inline-block; margin-bottom:12px;">📦 ARCHIVED</div>' : ''}
          <div class="order-top">
            <div>
              <div class="order-number">Order #${order.orderNumber}</div>
              <div class="order-date">${dateStr}</div>
            </div>
            <div class="order-total">$${order.total}</div>
          </div>

          <div class="order-grid">
            <div class="order-field">
              <label>Customer</label>
              <span>${order.name}</span>
            </div>
            <div class="order-field">
              <label>Email</label>
              <span>${order.email}</span>
            </div>
            <div class="order-field">
              <label>Items</label>
              <span>${order.items}</span>
            </div>
            <div class="order-field">
              <label>Payment</label>
              <span>${order.payMethod === "card" ? "💳 Credit/Debit Card" : order.payMethod === "venmo" ? "💙 Venmo" : order.payMethod === "zelle" ? "💚 Zelle" : "—"}</span>
            </div>
            <div class="order-field">
              <label>Ship To</label>
              <span>${order.address}</span>
            </div>
            ${order.notes ? `
            <div class="order-field">
              <label>Notes</label>
              <span>${order.notes}</span>
            </div>` : ""}
            ${order.refundInfo ? `
            <div class="order-field" style="grid-column: 1 / -1;">
              <label>Refund</label>
              <span style="color:#c0392b; font-weight:600;">${order.refundInfo}</span>
            </div>` : ""}
            <div class="order-field" style="grid-column: 1 / -1;">
              <label>Tracking Number</label>
              <div style="display:flex; align-items:center; gap:8px; margin-top:4px;">
                <span id="trackingDisplay-${order.orderNumber}" style="font-size:14px; color:var(--text); ${order.tracking ? '' : 'color:var(--gray-mid); font-style:italic;'}">${order.tracking || "Not yet added"}</span>
                <button class="btn btn-gray" style="padding:4px 10px; font-size:12px;" onclick="toggleTrackingEdit('${order.orderNumber}')">✏️ ${order.tracking ? "Edit" : "Add"}</button>
              </div>
              <div id="trackingEdit-${order.orderNumber}" style="display:none; margin-top:8px;">
                <div style="display:flex; gap:8px; align-items:center;">
                  <input type="text" id="trackingInput-${order.orderNumber}" 
                    value="${order.tracking || ""}"
                    placeholder="Enter USPS tracking number"
                    style="flex:1; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:'Source Sans 3',sans-serif;">
                  <button class="btn btn-green" onclick="saveTracking('${order.orderNumber}')">Save</button>
                  <button class="btn btn-gray" onclick="toggleTrackingEdit('${order.orderNumber}')">Cancel</button>
                </div>
                <p style="font-size:12px; color:var(--gray-mid); margin-top:6px;">💡 Saving will automatically send a tracking email to the customer via Google Sheets.</p>
              </div>
            </div>
          </div>

          <div class="order-actions">
            <select class="status-select" id="status-${order.orderNumber}"
              onchange="updateStatus('${order.orderNumber}', this)">
              <option ${order.status === "New - Unpaid"          ? "selected" : ""}>New - Unpaid</option>
              <option ${order.status === "New - Paid"            ? "selected" : ""}>New - Paid</option>
              <option ${order.status === "In Progress - Unpaid"  ? "selected" : ""}>In Progress - Unpaid</option>
              <option ${order.status === "In Progress - Paid"    ? "selected" : ""}>In Progress - Paid</option>
              <option ${order.status === "Shipped"               ? "selected" : ""}>Shipped</option>
              <option ${order.status === "Cancelled"             ? "selected" : ""}>Cancelled</option>
            </select>

            <span class="save-status" id="save-${order.orderNumber}">✓ Saved!</span>

            ${order.receiptUrl ? `
              <a href="${order.receiptUrl}" target="_blank" class="btn btn-gold">🧾 Receipt</a>
            ` : order.packingSlip ? `
              <a href="${order.packingSlip}" target="_blank" class="btn btn-gold">📄 Old Packing Slip</a>
            ` : ""}

            ${order.labelUrl && !["ADDRESS_PARSE_FAILED","NO_RATE_FOUND","LABEL_FAILED",""].includes(order.labelUrl) ? `
              <a href="${order.labelUrl}" target="_blank" class="btn btn-blue">🏷️ Label</a>
              <button class="btn btn-gray" onclick="generateLabel('${order.orderNumber}', '${order.labelUrl}')">🔄 Regenerate</button>
            ` : `
              <button class="btn btn-gray" onclick="generateLabel('${order.orderNumber}', '')" id="labelBtn-${order.orderNumber}">🏷️ Generate Label</button>
            `}

            ${order.status !== "Cancelled" ? `
              <button class="btn btn-gray" id="receiptBtn-${order.orderNumber}" onclick="toggleReceiptPanel('${order.orderNumber}')">📧 Send Receipt</button>
              <button class="btn btn-gray" onclick="toggleMessagePanel('${order.orderNumber}')">✉️ Message</button>
              <button class="btn btn-gray" onclick="sendReviewRequest('${order.orderNumber}')">⭐ Request Review</button>
              <button class="btn btn-red" onclick="openCancelModal('${order.orderNumber}')">✕ Cancel</button>
            ` : `<span style="font-size:13px; color:#999; font-style:italic;">Order cancelled</span>`}
            ${order.status === "Shipped" || order.status === "Cancelled" ? `
              <button class="btn btn-gray" onclick="archiveOrder('${order.orderNumber}')">📦 Archive</button>
            ` : ""}
          </div>
          ${order.status !== "Cancelled" ? `
          <div id="receiptPanel-${order.orderNumber}" style="display:none; margin:0 24px 24px; padding:14px 16px; background:#f7f4ee; border:1px solid #e8e4dc; border-radius:8px;">
            <label style="font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#4a8c60; display:block; margin-bottom:6px;">Payment Reference <span style="font-weight:400; text-transform:none; letter-spacing:0;">(optional)</span></label>
            <input type="text" id="receiptRef-${order.orderNumber}" placeholder="Venmo/Zelle transaction ID"
              style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:'Source Sans 3',sans-serif; margin-bottom:10px;">
            <div style="display:flex; gap:8px;">
              <button class="btn btn-green" onclick="confirmSendReceipt('${order.orderNumber}')">Send Receipt</button>
              <button class="btn btn-gray" onclick="toggleReceiptPanel('${order.orderNumber}')">Cancel</button>
            </div>
          </div>` : ""}
          ${order.status !== "Cancelled" ? `
          <div id="messagePanel-${order.orderNumber}" style="display:none; margin:0 24px 24px; padding:14px 16px; background:#f7f4ee; border:1px solid #e8e4dc; border-radius:8px;">
            <label style="font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#4a8c60; display:block; margin-bottom:6px;">Message to ${order.name.split(" ")[0]}</label>
            <textarea id="messageBody-${order.orderNumber}" rows="5" placeholder="Type your message here..."
              style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:'Source Sans 3',sans-serif; margin-bottom:10px; resize:vertical;"></textarea>
            <div style="display:flex; gap:8px;">
              <button class="btn btn-green" onclick="sendMessage('${order.orderNumber}')">Send Message</button>
              <button class="btn btn-gray" onclick="toggleMessagePanel('${order.orderNumber}')">Cancel</button>
            </div>
          </div>` : ""}
        </div>`;
    }).join("");
  }

  async function updateStatus(orderNumber, select) {
    const newStatus = select.value;
    const card = document.getElementById("card-" + orderNumber);

    // Update card color
    Object.values(statusColors).forEach(c => card.classList.remove(c));
    card.classList.add(statusColors[newStatus] || "");

    try {
      await fetch(UPDATE_ORDER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          password:    adminPassword,
          orderNumber: orderNumber,
          status:      newStatus
        })
      });

      const msg = document.getElementById("save-" + orderNumber);
      msg.style.display = "inline";
      setTimeout(() => msg.style.display = "none", 2000);

      // Update local data
      const order = allOrders.find(o => o.orderNumber.toString() === orderNumber.toString());
      if (order) order.status = newStatus;
      updateStats();

    } catch (err) {
      alert("Could not save. Please try again.");
    }
  }

  // ── Receipt Modal ──
  // ── Receipt Inline Panel ──
  function toggleReceiptPanel(orderNumber) {
    const panel = document.getElementById("receiptPanel-" + orderNumber);
    const btn   = document.getElementById("receiptBtn-" + orderNumber);
    const isOpen = panel.style.display === "block";
    panel.style.display = isOpen ? "none" : "block";
    btn.textContent = isOpen ? "📧 Send Receipt" : "✕ Close";
    if (!isOpen) {
      document.getElementById("receiptRef-" + orderNumber).focus();
    }
  }

  async function confirmSendReceipt(orderNumber) {
    const order = allOrders.find(o => o.orderNumber.toString() === orderNumber.toString());
    if (!order) return;

    const reference = document.getElementById("receiptRef-" + orderNumber).value.trim();

    try {
      const res = await fetch("/.netlify/functions/send-receipt", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          password:        adminPassword,
          orderNumber:     order.orderNumber,
          name:            order.name,
          email:           order.email,
          items:           order.items,
          shipping:        order.shipping,
          total:           order.total,
          address:         order.address,
          date:            order.date,
          paymentIntentId: order.paymentIntentId || "",
          reference:       reference
        })
      });
      const data = await res.json();
      if (data.success) {
        toggleReceiptPanel(orderNumber);
        alert("✅ Receipt sent to " + order.email);
        await loadOrders();
      } else {
        alert("⚠️ Could not send receipt: " + (data.error || "Unknown error"));
      }
    } catch (err) {
      alert("⚠️ Could not send receipt. Please try again.");
    }
  }

  // ── Cancel Modal ──
  let cancelOrderNumber = null;
  let refundType = "full";

  function openCancelModal(orderNumber) {
    const order = allOrders.find(o => o.orderNumber.toString() === orderNumber.toString());
    if (!order) return;
    cancelOrderNumber = orderNumber;
    refundType = "full";

    document.getElementById("cancelModalDesc").textContent =
      `Cancel Order #${orderNumber} for ${order.name} ($${order.total})?`;

    document.getElementById("cancelReason").value = "";
    document.getElementById("manualRefInput").value = "";
    document.getElementById("partialAmount").value = "";

    const refundSection = document.getElementById("refundSection");
    const refundLabel = document.getElementById("refundSectionLabel");
    const isCard = order.paymentIntentId && !order.paymentIntentId.startsWith("pi_") === false;

    if (order.paymentIntentId) {
      refundLabel.textContent = "Stripe Refund";
      refundSection.style.display = "block";
      document.getElementById("manualRefRow").style.display = "none";
    } else {
      refundLabel.textContent = "Manual Refund";
      refundSection.style.display = "block";
      document.getElementById("manualRefRow").style.display = "none";
    }

    setRefundType("full");
    document.getElementById("cancelModal").style.display = "flex";
  }

  function closeCancelModal() {
    document.getElementById("cancelModal").style.display = "none";
    cancelOrderNumber = null;
  }

  function setRefundType(type) {
    refundType = type;
    const order = allOrders.find(o => o.orderNumber.toString() === cancelOrderNumber.toString());
    const isCard = order && order.payMethod === "card";

    document.getElementById("refundFullBtn").className    = "btn " + (type === "full"    ? "btn-green" : "btn-gray");
    document.getElementById("refundPartialBtn").className = "btn " + (type === "partial" ? "btn-green" : "btn-gray");
    document.getElementById("refundNoneBtn").className    = "btn " + (type === "none"    ? "btn-green" : "btn-gray");

    document.getElementById("partialAmountRow").style.display = type === "partial" ? "block" : "none";

    // Show manual reference field for Venmo/Zelle when refund is full or partial
    document.getElementById("manualRefRow").style.display =
      (!isCard && type !== "none") ? "block" : "none";
  }

  async function confirmCancel() {
    const order = allOrders.find(o => o.orderNumber.toString() === cancelOrderNumber.toString());
    if (!order) return;

    const reason = document.getElementById("cancelReason").value.trim();
    if (!reason) {
      alert("Please enter a reason for cancellation.");
      return;
    }

    let refundAmount = null;
    if (refundType === "partial") {
      refundAmount = parseFloat(document.getElementById("partialAmount").value);
      if (isNaN(refundAmount) || refundAmount <= 0) {
        alert("Please enter a valid refund amount.");
        return;
      }
    }

    const manualReference = document.getElementById("manualRefInput").value.trim();
    const isCard = order.payMethod === "card";

    if (!isCard && refundType !== "none" && !manualReference) {
      alert("Please enter a manual refund reference.");
      return;
    }

    closeCancelModal();

    // Issue refund
    let refundRef = "";
    let refundRecord = "";
    try {
      const refundBody = {
        password:        adminPassword,
        orderNumber:     order.orderNumber,
        reason:          reason,
        paymentMethod:   isCard ? "card" : (order.paymentMethod || "Venmo/Zelle"),
        manualReference: manualReference
      };
      if (isCard) refundBody.paymentIntentId = order.paymentIntentId;
      if (refundType === "partial") refundBody.amount = refundAmount;
      if (refundType === "none") refundBody.skipRefund = true;

      const refundRes = await fetch("/.netlify/functions/refund-order", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(refundBody)
      });
      const refundData = await refundRes.json();
      if (refundData.success) {
        refundRef = refundData.refundId || manualReference || "";
        refundRecord = refundData.refundRecord || "";
      } else {
        alert("⚠️ Refund failed: " + (refundData.error || "Unknown error"));
        return;
      }
    } catch (err) {
      alert("⚠️ Refund request failed. Please refund manually.");
      return;
    }

    // Update status — partial refund keeps current status, full/none sets to Cancelled
    const newStatus = refundType === "partial" ? order.status : "Cancelled";
    try {
      await fetch("/.netlify/functions/update-order", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          password:    adminPassword,
          orderNumber: order.orderNumber,
          status:      newStatus
        })
      });
    } catch (err) {
      alert("⚠️ Could not update order status. Please update manually.");
    }

    // Send cancellation email
    try {
      await fetch("/.netlify/functions/send-cancellation", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          password:      adminPassword,
          orderNumber:   order.orderNumber,
          name:          order.name,
          email:         order.email,
          items:         order.items,
          total:         order.total,
          refundAmount:  refundAmount || order.total,
          refundType:    refundType,
          reason:        reason,
          refundRef:     refundRef,
          paymentMethod: isCard ? "card" : (order.paymentMethod || "Venmo/Zelle")
        })
      });
    } catch (err) {
      console.warn("Cancellation email failed:", err);
    }

    // Update local data and UI
    const orderObj = allOrders.find(o => o.orderNumber.toString() === order.orderNumber.toString());
    if (orderObj) orderObj.status = newStatus;
    await loadOrders();

    alert(
      `✅ Order #${order.orderNumber} ${refundType === "partial" ? "partially refunded" : "cancelled"}.\n` +
      (refundRecord ? refundRecord + "\n" : "") +
      `Email sent to ${order.email}.`
    );
  }

  async function generateLabel(orderNumber, existingLabel) {
    const order = allOrders.find(o => o.orderNumber.toString() === orderNumber.toString());
    if (!order) return;

    if (existingLabel) {
      const confirm = window.confirm(`Order #${orderNumber} already has a label. Generate a new one anyway?`);
      if (!confirm) return;
    }

    const btn = document.getElementById("labelBtn-" + orderNumber);
    if (btn) btn.textContent = "Generating...";

    try {
      const res = await fetch("/.netlify/functions/generate-label", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          password:    adminPassword,
          orderNumber: order.orderNumber,
          name:        order.name,
          address:     order.address,
          shipping:    order.shipping
        })
      });

      const data = await res.json();

      if (data.success) {
        // Update local order data
        order.labelUrl = data.labelUrl;
        // Re-apply filters to maintain current view
        applyFilters();
        // Open label in new tab
        window.open(data.labelUrl, "_blank");
      } else {
        alert("⚠️ " + (data.error || "Could not generate label. Please try again."));
        if (btn) btn.textContent = "🏷️ Generate Label";
      }

    } catch (err) {
      alert("⚠️ Could not generate label. Please try again.");
      if (btn) btn.textContent = "🏷️ Generate Label";
    }
  }  
  
  // ── Tracking ──
  function toggleTrackingEdit(orderNumber) {
    const editDiv = document.getElementById("trackingEdit-" + orderNumber);
    const isOpen  = editDiv.style.display === "block";
    editDiv.style.display = isOpen ? "none" : "block";
    if (!isOpen) {
      document.getElementById("trackingInput-" + orderNumber).focus();
    }
  }

  async function saveTracking(orderNumber) {
    const tracking = document.getElementById("trackingInput-" + orderNumber).value.trim();
    if (!tracking) {
      alert("Please enter a tracking number.");
      return;
    }

    try {
      const res = await fetch("/.netlify/functions/update-tracking", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          password:    adminPassword,
          orderNumber: orderNumber,
          tracking:    tracking
        })
      });

      const data = await res.json();
      if (data.success) {
        // Update display
        const display = document.getElementById("trackingDisplay-" + orderNumber);
        display.textContent = tracking;
        display.style.color = "var(--text)";
        display.style.fontStyle = "normal";

        // Update local data
        const order = allOrders.find(o => o.orderNumber.toString() === orderNumber.toString());
        if (order) order.tracking = tracking;

        alert("✅ Tracking number saved! Customer will receive a tracking email shortly.");
        await loadOrders();
      } else {
        alert("⚠️ Could not save tracking number: " + (data.error || "Unknown error"));
      }
    } catch (err) {
      alert("⚠️ Could not save tracking number. Please try again.");
    }
  }

  async function archiveOrder(orderNumber) {
    const order = allOrders.find(o => o.orderNumber.toString() === orderNumber.toString());
    if (!order) return;

    const confirm = window.confirm(
      `Archive Order #${orderNumber} for ${order.name}?\n\nThis will move it to the Archive tab in Google Sheets and remove it from this view.`
    );
    if (!confirm) return;

    try {
      const res = await fetch("/.netlify/functions/archive-order", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          password:    adminPassword,
          orderNumber: orderNumber
        })
      });

      const data = await res.json();
      if (data.success) {
        allOrders = allOrders.filter(o => o.orderNumber.toString() !== orderNumber.toString());
        updateStats();
        applyFilters();
        alert(`✅ Order #${orderNumber} has been archived.`);
      } else {
        alert("⚠️ Could not archive order: " + (data.error || "Unknown error"));
      }
    } catch (err) {
      alert("⚠️ Could not archive order. Please try again.");
    }
  }

  function toggleMessagePanel(orderNumber) {
    const panel = document.getElementById("messagePanel-" + orderNumber);
    panel.style.display = panel.style.display === "none" ? "block" : "none";
    if (panel.style.display === "block") {
      document.getElementById("messageBody-" + orderNumber).value = "";
    }
  }

  async function sendMessage(orderNumber) {
    const order = allOrders.find(o => o.orderNumber.toString() === orderNumber.toString());
    if (!order) return;

    const message = document.getElementById("messageBody-" + orderNumber).value.trim();
    if (!message) {
      alert("Please enter a message.");
      return;
    }

    try {
      const res = await fetch("/.netlify/functions/send-message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          password:    adminPassword,
          orderNumber: order.orderNumber,
          name:        order.name,
          email:       order.email,
          message:     message
        })
      });
      const data = await res.json();
      if (data.success) {
        toggleMessagePanel(orderNumber);
        alert("✅ Message sent to " + order.email);
      } else {
        alert("⚠️ Could not send message: " + (data.error || "Unknown error"));
      }
    } catch (err) {
      alert("⚠️ Could not send message. Please try again.");
    }
  }
  
  async function sendReviewRequest(orderNumber) {
  const order = allOrders.find(o => o.orderNumber.toString() === orderNumber.toString());
  if (!order) return;

  if (!confirm(`Send a review request email to ${order.name}?`)) return;

  try {
    const res = await fetch("/.netlify/functions/send-review-request", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        password: adminPassword,
        orderNumber: order.orderNumber,
        name: order.name,
        email: order.email,
        items: order.items
      })
    });
    const result = await res.json();
    if (result.success) {
      alert(`Review request sent to ${order.name}!`);
    } else {
      alert("Could not send email: " + (result.error || "Unknown error"));
    }
  } catch (err) {
    alert("Error: " + err.message);
  }
}

  function logout() {
    sessionStorage.removeItem("adminPassword");
    window.location.href = "admin.html";
  }

  init();
</script>
</body>
</html>
