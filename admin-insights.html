<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insights - Caliber Reeds Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark:#1e3d2a;--green-mid:#2f5e3f;--green-light:#4a8c60;
      --gold:#c9a84c;--cream:#f7f4ee;--white:#ffffff;
      --gray-light:#e8e4dc;--gray-mid:#999;--text:#1a1a1a;
      --shadow:0 4px 20px rgba(0,0,0,0.10);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--text);max-width:860px;margin:0 auto;padding:48px 32px 60px;}
    .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--gray-light);}
    .admin-header h1{font-family:'Playfair Display',serif;font-size:32px;color:var(--green-dark);}
    .admin-header p{font-size:13px;color:var(--gray-mid);margin-top:4px;}
    .header-right{display:flex;align-items:center;gap:12px;}
    .admin-nav{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
    .admin-nav a{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none;background:var(--white);border:1px solid var(--gray-light);color:var(--green-dark);transition:all 0.2s;}
    .admin-nav a:hover{background:var(--green-dark);color:white;}
    .admin-nav a.active{background:var(--green-dark);color:white;}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}
    .stat{background:var(--white);border:1px solid var(--gray-light);border-radius:10px;padding:20px;text-align:center;box-shadow:var(--shadow);}
    .stat-number{font-family:'Playfair Display',serif;font-size:32px;color:var(--green-dark);font-weight:700;}
    .stat-label{font-size:12px;color:var(--gray-mid);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;}
    .card{background:var(--white);border:1px solid var(--gray-light);border-radius:12px;padding:28px;box-shadow:var(--shadow);margin-bottom:24px;}
    .card h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--green-dark);margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid var(--gold);display:inline-block;}
    .product-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-light);font-size:15px;}
    .product-row:last-child{border-bottom:none;}
    .product-row-name{color:var(--green-dark);font-weight:600;}
    .product-row-count{color:var(--gray-mid);}
    .product-row-revenue{color:var(--green-mid);font-weight:600;}
    .bar-wrap{flex:1;margin:0 16px;background:var(--gray-light);border-radius:4px;height:8px;}
    .bar-fill{height:8px;background:var(--green-mid);border-radius:4px;}
    .month-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-light);font-size:14px;}
    .month-row:last-child{border-bottom:none;}
    .loading{text-align:center;padding:40px;color:var(--gray-mid);}
    .btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;font-family:'Source Sans 3',sans-serif;cursor:pointer;transition:all 0.2s;}
    .btn-gray{background:var(--gray-light);color:var(--text);}
    .btn-gray:hover{background:#d5d0c8;}
    .logout-btn{background:none;border:1px solid var(--gray-light);border-radius:6px;padding:8px 16px;font-size:13px;color:var(--gray-mid);cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
    .logout-btn:hover{background:var(--gray-light);color:var(--text);}
    @media(max-width:600px){body{padding:32px 18px 48px;}.stats-grid{grid-template-columns:1fr 1fr;}.admin-header{flex-direction:column;gap:12px;}}
  </style>
</head>
<body>
  <div id="mainContent" style="display:none;">
    <div class="admin-header">
      <div>
        <h1>Insights</h1>
        <p>Caliber Reeds by Ben</p>
      </div>
      <div class="header-right">
        <a href="admin.html" class="btn btn-gray">← Settings</a>
        <button class="logout-btn" onclick="logout()">Log Out</button>
      </div>
    </div>
    <div class="admin-nav">
      <a href="admin.html">Settings</a>
      <a href="admin-orders.html">Orders</a>
      <a href="admin-prices.html">Prices</a>
      <a href="admin-insights.html" class="active">Insights</a>
      <a href="admin-reviews.html">Reviews</a>
    </div>
    <div class="card" style="margin-bottom:24px;">
      <h2 style="margin-bottom:16px;">Filters</h2>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
        <div>
          <label style="font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#4a8c60; display:block; margin-bottom:4px;">From Date</label>
          <input type="date" id="filterFrom" style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:'Source Sans 3',sans-serif;">
        </div>
        <div>
          <label style="font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#4a8c60; display:block; margin-bottom:4px;">To Date</label>
          <input type="date" id="filterTo" style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:'Source Sans 3',sans-serif;">
        </div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:16px;">
        <div>
          <label style="font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#4a8c60; display:block; margin-bottom:4px;">Customer</label>
          <input type="text" id="filterCustomer" placeholder="Search by name..." style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:'Source Sans 3',sans-serif;">
        </div>
        <div>
          <label style="font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#4a8c60; display:block; margin-bottom:4px;">Product</label>
          <select id="filterProduct" style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:'Source Sans 3',sans-serif;">
            <option value="">All Products</option>
          </select>
        </div>
        <div>
          <label style="font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#4a8c60; display:block; margin-bottom:4px;">Payment</label>
          <select id="filterPayment" style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:'Source Sans 3',sans-serif;">
            <option value="">All Methods</option>
            <option value="card">Card</option>
            <option value="venmo">Venmo</option>
            <option value="zelle">Zelle</option>
          </select>
        </div>
      </div>
      <div style="display:flex; gap:12px; align-items:center;">
        <button class="btn btn-gray" onclick="clearFilters()">Clear Filters</button>
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer;">
          <input type="checkbox" id="includeShipping" onchange="applyFilters()" style="width:16px; height:16px;">
          Include shipping in revenue
        </label>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat"><div class="stat-number" id="statOrders">—</div><div class="stat-label">Total Orders</div></div>
      <div class="stat"><div class="stat-number" id="statRevenue">—</div><div class="stat-label">Revenue</div></div>
      <div class="stat"><div class="stat-number" id="statShipping">—</div><div class="stat-label">Shipping Collected</div></div>
      <div class="stat"><div class="stat-number" id="statRefunds">—</div><div class="stat-label">Total Refunded</div></div>
      <div class="stat"><div class="stat-number" id="statAvg">—</div><div class="stat-label">Avg Order Value</div></div>
    </div>
    <div class="card">
      <h2>Sales by Product</h2>
      <div id="productBreakdown"><div class="loading">Loading...</div></div>
    </div>
    <div class="card">
      <h2>Orders by Month</h2>
      <div id="monthBreakdown"><div class="loading">Loading...</div></div>
    </div>
  </div>
  <div id="authError" style="display:none;text-align:center;padding:60px 20px;">
    <p style="font-size:16px;color:#c00;margin-bottom:16px;">You need to log in first.</p>
    <a href="admin.html" style="color:#2f5e3f;font-weight:600;">← Go to Admin Login</a>
  </div>
  <script>
    const GET_INSIGHTS_URL = "/.netlify/functions/get-insights";
    let adminPassword = sessionStorage.getItem("adminPassword") || "";
    let allOrders = [];
  
    async function init() {
      if (!adminPassword) {
        document.getElementById("authError").style.display = "block";
        return;
      }
      document.getElementById("mainContent").style.display = "block";
      await loadInsights();
  
      // Attach filter listeners
      document.getElementById("filterFrom").addEventListener("change", applyFilters);
      document.getElementById("filterTo").addEventListener("change", applyFilters);
      document.getElementById("filterCustomer").addEventListener("input", applyFilters);
      document.getElementById("filterProduct").addEventListener("change", applyFilters);
      document.getElementById("filterPayment").addEventListener("change", applyFilters);
    }
  
    async function loadInsights() {
      try {
        const response = await fetch(GET_INSIGHTS_URL + "?password=" + encodeURIComponent(adminPassword));
        if (response.status === 401) {
          sessionStorage.removeItem("adminPassword");
          document.getElementById("mainContent").style.display = "none";
          document.getElementById("authError").style.display = "block";
          return;
        }
        allOrders = await response.json();
  
        // Populate product filter dropdown
        const productNames = new Set();
        allOrders.forEach(o => {
          if (!o.items) return;
          o.items.split(",").forEach(part => {
            const match = part.trim().match(/^(.+?)\s+x(\d+)$/);
            if (match) productNames.add(match[1].trim());
          });
        });
        const productSelect = document.getElementById("filterProduct");
        productNames.forEach(name => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          productSelect.appendChild(opt);
        });
  
        applyFilters();
  
      } catch (err) {
        document.getElementById("productBreakdown").innerHTML = '<div class="loading">Could not load data.</div>';
      }
    }
  
    function parseRefundAmount(refundInfo) {
      if (!refundInfo) return 0;
      const match = refundInfo.match(/Refunded \$([0-9.]+)/);
      return match ? parseFloat(match[1]) : 0;
    }
  
    function applyFilters() {
      const from        = document.getElementById("filterFrom").value;
      const to          = document.getElementById("filterTo").value;
      const customer    = document.getElementById("filterCustomer").value.trim().toLowerCase();
      const product     = document.getElementById("filterProduct").value;
      const payment     = document.getElementById("filterPayment").value;
      const inclShip    = document.getElementById("includeShipping").checked;
  
      let filtered = allOrders.filter(o => {
        // Exclude cancelled orders from revenue but keep for count if needed
        if (o.status === "Cancelled") return false;
  
        if (from && new Date(o.date) < new Date(from)) return false;
        if (to   && new Date(o.date) > new Date(to + "T23:59:59")) return false;
        if (customer && !o.name.toLowerCase().includes(customer)) return false;
        if (payment  && o.payMethod !== payment) return false;
        if (product) {
          if (!o.items || !o.items.toLowerCase().includes(product.toLowerCase())) return false;
        }
  
        return true;
      });
  
      // Stats
      const totalOrders   = filtered.length;
      const totalShipping = filtered.reduce((s, o) => s + o.shipping, 0);
      const totalRefunds  = filtered.reduce((s, o) => s + parseRefundAmount(o.refundInfo), 0);
      const productRevenue = filtered.reduce((s, o) => s + (o.total - o.shipping), 0);
      const revenue       = inclShip
        ? filtered.reduce((s, o) => s + o.total, 0) - totalRefunds
        : productRevenue - totalRefunds;
      const avgOrder      = totalOrders > 0 ? filtered.reduce((s, o) => s + o.total, 0) / totalOrders : 0;
  
      document.getElementById("statOrders").textContent   = totalOrders;
      document.getElementById("statRevenue").textContent  = "$" + revenue.toFixed(0);
      document.getElementById("statShipping").textContent = "$" + totalShipping.toFixed(0);
      document.getElementById("statRefunds").textContent  = "$" + totalRefunds.toFixed(0);
      document.getElementById("statAvg").textContent      = "$" + avgOrder.toFixed(0);
  
      // Product breakdown
      const productCounts = {};
      filtered.forEach(o => {
        if (!o.items) return;
        o.items.split(",").forEach(part => {
          const match = part.trim().match(/^(.+?)\s+x(\d+)$/);
          if (match) {
            const name = match[1].trim();
            const qty  = parseInt(match[2]);
            productCounts[name] = (productCounts[name] || 0) + qty;
          }
        });
      });
  
      const maxCount = Math.max(...Object.values(productCounts), 1);
      const productHtml = Object.entries(productCounts)
        .sort((a, b) => b[1] - a[1])
        .map(([name, count]) => `
          <div class="product-row">
            <span class="product-row-name">${name}</span>
            <div class="bar-wrap"><div class="bar-fill" style="width:${(count/maxCount*100).toFixed(0)}%"></div></div>
            <span class="product-row-count">${count} sold</span>
          </div>`).join("");
      document.getElementById("productBreakdown").innerHTML = productHtml || '<div class="loading">No data yet.</div>';
  
      // Monthly breakdown
      const monthly = {};
      filtered.forEach(o => {
        if (!o.date) return;
        const d = new Date(o.date);
        const key = d.toLocaleDateString("en-US", { year: "numeric", month: "long" });
        if (!monthly[key]) monthly[key] = { count: 0, revenue: 0, shipping: 0 };
        monthly[key].count++;
        monthly[key].revenue += inclShip ? o.total : (o.total - o.shipping);
        monthly[key].shipping += o.shipping;
      });
  
      const monthHtml = Object.entries(monthly)
        .reverse()
        .map(([month, data]) => `
          <div class="month-row">
            <span style="font-weight:600;color:var(--green-dark);">${month}</span>
            <span style="color:var(--gray-mid);">${data.count} order${data.count !== 1 ? "s" : ""}</span>
            <span style="font-weight:600;color:var(--green-mid);">$${data.revenue.toFixed(0)}</span>
            ${inclShip ? `<span style="font-size:12px;color:var(--gray-mid);">(incl. $${data.shipping.toFixed(0)} shipping)</span>` : ""}
          </div>`).join("");
      document.getElementById("monthBreakdown").innerHTML = monthHtml || '<div class="loading">No data yet.</div>';
    }
  
    function clearFilters() {
      document.getElementById("filterFrom").value      = "";
      document.getElementById("filterTo").value        = "";
      document.getElementById("filterCustomer").value  = "";
      document.getElementById("filterProduct").value   = "";
      document.getElementById("filterPayment").value   = "";
      applyFilters();
    }
  
    function logout() {
      sessionStorage.removeItem("adminPassword");
      window.location.href = "admin.html";
    }
  
    init();
  </script>
</body>
</html>
